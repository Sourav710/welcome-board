    <script>
      // Apply saved theme before render to prevent flash
      const t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>

    <div id="root"></div>

  </body>
